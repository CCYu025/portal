<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="YU FENG 內部系統入口，集中管理生產、文件與專案系統。">
  <title>YU FENG 內部系統入口</title>
  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="assets/styles.css">
  <script type="module" src="assets/app.js"></script>
</head>
<body>
  <a class="skip-link" href="#content">跳到主要內容</a>

  <header class="app-header" role="banner">
    <div class="header-inner">
      <a class="brand" href="./" aria-label="YU FENG 內部系統入口首頁">
        <img src="logo.png" alt="YU FENG" class="brand-logo">
        <span class="brand-text">
          <strong>內部系統入口</strong>
          <span>Production Portal</span>
        </span>
      </a>

      <div class="header-actions">
        <button class="search-trigger" type="button" id="searchTrigger" aria-haspopup="dialog">
          <span class="search-icon" aria-hidden="true"></span>
          <span>搜尋系統</span>
          <kbd>Ctrl K</kbd>
        </button>
        <div class="vpn-state" id="vpnState" data-state="checking" role="status" aria-live="polite">
          <span class="state-dot" aria-hidden="true"></span>
          <span id="vpnStateText">偵測 VPN</span>
        </div>
      </div>
    </div>
  </header>

  <div class="shell">
    <aside class="sidebar" aria-label="入口分類">
      <nav class="side-nav" aria-labelledby="navTitle">
        <h2 id="navTitle">分類</h2>
        <div id="categoryNav" class="nav-list"></div>
      </nav>
    </aside>

    <main id="content" class="content" tabindex="-1">
      <section class="intro" aria-labelledby="pageTitle">
        <p class="eyebrow">YU FENG Portal</p>
        <h1 id="pageTitle">系統入口</h1>
        <p class="intro-copy">集中開啟生產監控、內部文件與專案紀錄；常用項目會依使用紀錄與釘選自動置頂。</p>
      </section>

      <section class="toolbar" aria-label="篩選工具">
        <div class="filter-group" id="filterGroup" role="list"></div>
        <button class="text-button" type="button" id="clearPrefs">清除個人化</button>
      </section>

      <div id="portalSections" class="portal-sections" aria-live="polite"></div>
    </main>
  </div>

  <template id="sectionTemplate">
    <section class="system-section" aria-labelledby="">
      <div class="section-heading">
        <h2></h2>
        <span class="section-count"></span>
      </div>
      <div class="system-grid"></div>
    </section>
  </template>

  <template id="systemCardTemplate">
    <article class="system-card" data-card>
      <a class="system-link" target="_blank" rel="noopener">
        <span class="health-dot" aria-hidden="true"></span>
        <span class="system-icon" aria-hidden="true"></span>
        <span class="system-body">
          <span class="system-title-row">
            <strong class="system-title"></strong>
            <span class="badges"></span>
          </span>
          <span class="system-desc"></span>
          <span class="system-meta"></span>
        </span>
      </a>
      <button class="pin-button" type="button" aria-pressed="false">
        <span class="sr-only">釘選</span>
      </button>
    </article>
  </template>

  <div class="palette" id="palette" role="dialog" aria-modal="true" aria-labelledby="paletteTitle" hidden>
    <div class="palette-panel">
      <div class="palette-search">
        <span class="search-icon" aria-hidden="true"></span>
        <label class="sr-only" for="paletteInput" id="paletteTitle">搜尋系統</label>
        <input id="paletteInput" type="search" autocomplete="off" placeholder="輸入系統、分類或關鍵字">
        <kbd>Esc</kbd>
      </div>
      <div id="paletteResults" class="palette-results" role="listbox"></div>
    </div>
  </div>
</body>
</html>
